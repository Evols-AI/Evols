# nginx.conf.template
# This file uses ${LIBRECHAT_UPSTREAM} and ${FRONTEND_UPSTREAM} placeholders.
# A start script runs envsubst at container start to produce /etc/nginx/nginx.conf.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --------------------------------------------------------------------------
    # Logging
    # --------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # --------------------------------------------------------------------------
    # Performance
    # --------------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    # --------------------------------------------------------------------------
    # Gzip
    # --------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # --------------------------------------------------------------------------
    # Upstreams (values injected by envsubst at container start)
    # --------------------------------------------------------------------------
    upstream librechat {
        server ${LIBRECHAT_UPSTREAM};
        keepalive 32;
    }

    upstream frontend {
        server ${FRONTEND_UPSTREAM};
        keepalive 32;
    }

    # --------------------------------------------------------------------------
    # WebSocket / SSE upgrade map
    # --------------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # --------------------------------------------------------------------------
    # Server
    # --------------------------------------------------------------------------
    server {
        listen       8080;
        server_name  _;

        # Cloud Run health check — respond quickly without proxying
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ------------------------------------------------------------------
        # LibreChat — /workbench/app/ and everything under it
        # LibreChat is started with BASE_PATH=/workbench/app so the path
        # is forwarded as-is (no rewrite needed).
        # ------------------------------------------------------------------
        location /workbench/app/ {
            proxy_pass         http://librechat;

            # HTTP version for keep-alive
            proxy_http_version 1.1;

            # WebSocket / SSE upgrade
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;

            # Standard proxy headers
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Disable buffering for SSE / streaming responses
            proxy_buffering        off;
            proxy_cache            off;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
            proxy_connect_timeout  10s;

            # Allow large uploads (LibreChat file attachments)
            client_max_body_size   50m;
        }

        # ------------------------------------------------------------------
        # Frontend — everything else
        # ------------------------------------------------------------------
        location / {
            proxy_pass         http://frontend;

            proxy_http_version 1.1;

            # Keep-alive to upstream
            proxy_set_header   Connection        "";

            # Standard proxy headers
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout     60s;
            proxy_send_timeout     60s;
            proxy_connect_timeout  10s;

            client_max_body_size   10m;
        }
    }
}
